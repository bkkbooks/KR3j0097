body:
  text: 師友談記雜家類三雜説之屬提要臣等謹案師友談記一卷宋李廌撰廌有徳隅齋畫品己著録是書記蘇軾范祖禹及黄庭堅秦觀晁說之張耒所談故曰師友其人皆元祐勝流而廌之學問文章亦足與相亞能解諸人之所談所載多名言格論非小說瑣録之比其述秦觀論賦之語反覆數條曲盡工巧而終以為場屋之賦不足重可謂不阿所好書中稱哲宗為今上盖作於元祐中末記蘇軾為兵部尚書及帥定州事軾到定州不久即南遷則是書之成又當在元祐諸人盡罹貶斥之後知其交由神契非以勢利相攀且以潦倒場屋之人於新經義盛行之時曲附其說即可以立致科第而獨載排斥笑謔之語不肯稍遜窮視其所不為亦可謂介然有守矣寥寥數簡之書而至今孤行於天地豈偶然哉乾隆四十六年十月恭校上總纂官臣紀均臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e290bbcef64cb31cfce95c4c99c94ee6035ce96ef4ffbd412fdf4e3b25a4cfe5
