body:
  text: 師友談記宋李豸撰元祐癸酉正月二十六日見東坡先生禮部尚書蘇公子瞻先生自號居士公曰近因講筵從容為上言人君之學與臣庶異臣等幼時父兄驅率讀書初甚苦之漸知好學則自知趣向既久則中心樂之既有樂好之意則自進不已古人所謂知之者不如好之者好之者不如樂之者陛下上聖固與中人不同然必欲進學亦須自好樂中有所悟入且陛下之學不在求名與求知不為章句科舉計也然欲周知天下章疏觀其人文章事實又萬幾之政非學無所折衷上甚以為然退見宰輔誦其語且曰上天性好學某將自漢至唐擇其君臣大節政事之要為一書以備進讀今讀三朝寶訓林子中所編也東坡先生近令門人輩作人不易物賦物為一人重輕也或戲作一聯曰伏其几而襲其裳豈為孔子學其書而戴其帽未是蘇公士大夫近年效東坡桶高簷短名帽曰子瞻樣豸因言之公笑曰近扈從燕醴泉觀優人以相與自夸文章為戲者一優丁仙現者曰吾之文章汝輩不可及也衆優曰何也曰汝不見吾頭上子瞻乎上為解顔顧公久之東坡先生居閶闔門外白家巷中一夕次子逮之婦歐陽氏文忠公孫棐之女産後因病為祟所憑曰吾姓王氏名靜奴滯魄在此居久矣公曰吾非畏鬼人也且京師善符劒遣厲者甚多決能逐汝汝以愚而死死亦妄為祟為言佛氏破妄解脫之理喻之曰汝善去明日昏時當用佛氏功德之法與汝婦輒合爪曰感尚書去也婦良愈明日昏時為自書功德疏一通仍為置酒炙香火遣送之公曰某平生屢與鬼神辨論矣頃逮之幼忽云有賊貌瘦而黑衣以青公使數人索之無有也乳媼俄發狂聲色俱怒如卒伍輩唱喏甚大公往視之輒厲聲曰某即瘦黑而衣青者也非賊也鬼也欲此媼出為我作巫公曰寧使其死出不可得曰學士不令渠出不奈何只求少功德可乎公曰不可又曰求少酒食可乎公曰不可又曰求少紙可乎公曰不可又曰只求一杯水可乎公曰與之媼飲畢仆地而蘇然媪之乳因此遂枯公曰頃在鳳翔罷官來京師道由華嶽忽隨行一兵遇祟甚狂自褫其衣巾不已公使人束縛之而其巾自墜人皆曰此嶽神之怒故也公因謁祠且曰某昔之去無祈今之回無禱特以道出祠下不敢不謁而已隨行一兵狂發遇祟而居人曰神之怒也未知其果然否此一小人如蟣蝨爾何足以煩神之威靈哉縱此人有隱惡則不可知不然以其懈怠失禮或盜服御飲食等小罪爾何足責也當置之度外竊謂嶽鎮之重所隸甚廣其間強有力富貴者蓋有公為姦慝神不敢於彼示其威靈而乃加怒於一卒無乃不可乎某小官一人病則一事闕煩恕之可乎非某愚直諒神不聞此言出廟馬前一旋風突而出忽作大風震鼓天地沙石驚飛公曰神愈怒乎吾弗畏也冒風即行風愈大惟趂公行李而人馬皆辟易不可移足或勸之曰禱謝之公曰禍福天也神怒即怒吾行不止其如豫何己而風止竟無别事東坡先生嘗謂某曰范淳夫講書為今經筵講官第一言簡而當無一冗字無一長語義理明白而成文粲然乃得講書三昧也豸自太史先生以國史修撰知國史院兼修國史故曰太史公初在講筵即遊其門今且八年自昔嘗聞公詰朝當講即前一夕正衣冠儼然如在上前命子弟侍坐先按講其説豸未始得與聽也邇來遂獲與聽先生平時溫溫其語若不出諸口及當講開列古義仍參之時事暨近代本朝典故以為戒勸其音琅琅然聞者興起冝乎久侍邇英而為儒林之冠也二月朔太史公當講豸前一夕獲聞按講王制巡狩望之禮曰古之人多因燔望秩之説乃附會為封禪之事或以求神仙或以祈福或以告太平成功皆秦漢之侈心非古者巡狩省方之義為人臣凡有勸人主封禪者佞臣也豸以此言為守成之龜鑑豸少時有好名急進之弊獻書公車者三多觸聞罷然其志不已復多遊巨公之門自丙寅年東坡嘗誨之曰如子之才自當不沒要當循分不可躁求王公之門何必時曳裾也爾後常以為戒自昔二三名卿已相知外八年中未嘗一謁貴人中間有貴人使人諭殷勤欲相見雖其人之賢可親然豸所守匹夫之志亦未敢自變也嘗為太史公言之公曰士人正當爾耳士未為臣進退裕如也他日子仕於朝欲如今日足以自如未易得之矣李文正嘗曰士人當使王公聞名多而識面少此最名言蓋寧使王公訝其不來無使王公訝其不去如子尚何求名惟在飬其高志爾豸以此言如佩韋弦也太史公嘗講禮曰擬人必於其倫先儒之説謂擬君於君之倫擬臣於臣之倫臣以為此特位而已擬人必以德為貴桀紂人君也謂匹夫為桀紂其人必不肯受孔孟匹夫也謂人君為孔孟其人必不敢當友人董耘饋長沙貓笋豸以享太史公太史公輒作詩為貺曰因笋寓意且以為贈爾其詩曰穿雲斸石逺林空來涉江波萬萬重實比梧桐能食鳳籜翻風雨便成龍一枝未許塵鞍挂千畝終留渭水封陋巷菜羹知不稱君王玉食願時供豸即和之亦以寓自興之意且述前相知之情焉其詩曰節藏泥滓氣凌空薦俎寧知肉味重未許韋編充簡册已勝絲委誑蛟龍長沙故事短萌任逐霜刀重美幹須煩雪壤封他日要令髙士愛不應常奉宰夫供秦少遊亦和之曰楚山春笋斸雲空北客常嗟食不重秀色可憐刀切玉清香不斷鼎烹龍論羮未愧蓴千里入貢常隨傳一封薄祿飬親甘旨少滿苞時賴故人供鄧慎思常遺之豸謂少遊曰比見東坡言少遊文章如美玉無瑕又琢磨之功殆未有出其右者少遊曰某少時用意作文講貫已成誠如所諭點檢不破不畏磨難然自以平弱為愧邢和叔嘗曰子之文銖兩不差非稱上稱來乃等子上等來也豸曰人之文章闊逹者失之太疏謹嚴者失之太弱少遊之文詞雖華而氣古事備而意髙如鍾鼎然其體質規模質重而簡易其刻畫篆文則後之鑄師莫能倣佛宜乎東坡稱之為天下竒作也非過言矣二月十日出陳橋門稍西十里白溝上原謁陽翟縣令孫敬之愭會開府承議郎張弼非夜話張浙人也傳云劉簽樞知定州錢穆父居樞位其實則無也豸謂孫敬之曰嵗前豸到陽翟競傳蔣頴叔為辭熙帥奪待制以本官譴知舒州豸曰出京時上宫謝見蔣頴叔以待制扈從不足信衆鄉人咻之今日穆父之拜竊恐如頴叔之傳也已而果然乃知虗傳之書不必逺方雖國門之外已不足信矣敬之曰今年上元吕丞相夫人禁中侍宴獨以上相之夫人得奉觴進於二聖餘執政命婦則並立副階上北嚮羅拜宴罷辭謝皆登露臺望拜奉觴以進頗戰栗寶慈曰夫人與吾年相若特命二女使扶擁以示恩意敬之曰吕相夫人乃中表親也為某言禁中禮數甚詳曰御宴惟五人上居中寶慈在東長樂在西皆南向太妃暨中宫皆西向寶慈暨長樂皆白角團冠前後惟白玉龍簪而已衣黃背子衣無華彩太妃暨中宫皆縷金雲月冠前後亦白玉龍簪而飾以北珠珠甚大衣紅背子皆用珠為飾中宫雖預坐而婦禮甚謹惟內顧寶慈坐不敢安雖廣樂在廷未嘗一視也上前後供侍固多女使皆天下竒色惟有四人一樣粧梳衣服之類無少異俄至上側未移刻又忽四人至凡十有六畨其服飾珠翠之盛信天下之所未覩上天顔穆然敬奉二宫有不邇聲色之意秦少遊論賦至悉曲盡其妙蓋少時用心於賦甚勤而專常記前人所作一二篇至今不忘也少遊言凡小賦如人之元首而破題二句乃其眉惟貴氣貌有以動人故先擇事之至精至當者先用之使觀之便知妙用然後第二韻探原題意之所從來須便用議論第三韻方立議論明其旨趣第四韻結斷其説以明題意思全備第五韻或引事或反説第七韻反説或要終立義第八韻卒章尤要好意思爾少遊言賦中工夫不厭子細先尋事以押官韻及先作諸隔句凡押官韻須是穩熟瀏亮使人讀之不覺牽強如和人詩不似和詩也少遊云賦中用事唯要處置才見題便類聚事實看緊慢分布在八韻中如事多者便須精擇其可用者用之可以不用者棄之不必惑於多愛留之徒為纍耳如事少者須於合用先占下别處要用者不可那掇少遊言賦中用事如天然全其對屬親確者固為上如長短不等對屬不的者須别自用其語而裁剪之不可全務古語而有疵病也譬如以金為器一則無縫而甚陋一則有縫而甚佳然則與其無縫而陋不若有縫而佳也有縫而佳且猶貴之無縫而佳則可知矣少遊言賦中用事直須主客分明當取一君二民之義借如六字句中兩字最緊即須用四字為客兩字為主其為客者必須協順賔從成就其主使於句中煥然明白不可使主客紛然也少遊言賦中作用與雜文不同雜文則事詞在人主氣變化若作賦則惟貴鍊句之功鬬難鬬巧鬬新借如一事他人用之不過如此吾之所用則雖與衆同其語之巧迥與衆别然後為工也少遊言賦家句脈自與雜文不同雜文語句或長或短一在於人至於賦則一言一字必要聲律凡所言語須當用意屈折斫磨須令協於調格然後用之不協律義理雖是無益也少遊言凡賦句全藉牽合而成其初兩事甚不相侔以言貫穿之便可為吾所用此鍊句之工也少遊言今賦乃江左文章雕敝之餘風非漢賦之比也國朝前輩多循唐格文冗事迃獨宋范滕鄭數公得名於世至於嘉祐之末治平之間賦格始備廢二十餘年而復用當時之風未易得也已少遊言賦之説雖工巧如此要之是何等文字豸曰觀少遊之説作賦正如填歌曲爾少遊曰誠然夫作曲雖文章卓越而不協於律其聲不和作賦何用好文章只以智巧飣餖為偶儷而已若論為文非可同日語也朝廷用此格以取人而士欲合其格不可奈何爾東坡嘗云頃年文忠歐公薦某先君薦章才上一時公卿爭先求識面交口推服聲名一日大振蓋歐公之言既取重於世而當時之人亦有喜賢好善之心無紛紛然翕訿之間言也東坡云頃同黃門公初赴制舉之召到都下是時同召試者甚多一日相國韓公與客言曰二蘇在此而諸人亦敢與之較試何也此語既傳於是不試而竟去者十蓋八九矣東坡云國朝試科目昔在八月中旬頃與黃門公既將試黃門公忽疾卧病中自料不能及矣相國韓魏公知之輒奏上曰今嵗召制科諸士惟蘇軾蘇轍最有聲望今聞蘇轍偶病未可試如此人兄弟中一人不得就試甚非衆望欲展限以俟上許之黃門病中魏公數使人問安否既聞全安方引試凡比常例展二十日自後試科目並在九月蓋始於此比者相國吕微仲語及科目何故延及秋末之説東坡為吕相國言之相國曰韓忠獻其賢如此深可慕爾東坡云頃試制舉中程後英宗皇帝即欲便授知制誥相國韓公曰蘇軾之才逺大之器也他日自當為天下用要在朝廷培養之使天下之士莫不畏慕降伏皆欲朝廷進用之然後取而用之則人人無復異詞矣今驟用之則天下之士未必以為然適足以纍之也英宗曰知制誥既未可且與修起居注可乎魏公曰記注與制誥為鄰未可遽授不若且於館閣中擇近上貼職與之他日擢用亦未為晚乃授直史館歐陽文忠時為參政慮執政官中有不喜魏公者喋於東坡坡曰公所以於某之意乃古之所謂君子愛人以德者歟蘇仲豫逮言新宗正丞程遵彥之邵內行全好人所難能豸詢其如何曰遵彥嘗為杭州僉判以故知其居家之道甚詳遵彥之母極嚴厲遵彥之妻不得其志逐去遵彥方三十嵗承順母意不復言娶與母對牀而寢今二十年矣因遂絶嗜欲未嘗一日失其歡心其母亦撫養遵彥諸子恩意周至但諸孫或一言思其出母則詬怒遵彥之妻亦賢無辜得罪被逐於其姑亦無怨言嵗時問安奉禮物不輟雖異居而婦禮甚修至今獨居守節不可奪士大夫賢遵彥怪其母憫其妻哀其子也王仲薿承事字豐甫相國郇公之子也昔為豸言東坡公頃應進士舉到省時郇公以翰林學士知舉得其論與䇿二真本論即刑賞忠厚之至也凡三次起草雖稿亦記塗注其慎如此論卷業為道人梁沖所竊今所存惟䇿藁爾沖以吐納醫藥為術東坡貶時識之今在京師豐甫欲訴於官取之爾豐甫言頃其女兄之夫髙旦受知於相國司馬溫公已除河北糴糧草使一日謁溫公方起立稟事忽瞑目口不能言遽蹶而仆溫公遭壓焉衆公扶救溫公而旦已不知人事溫公令人肩舁以歸即死明日溫公使吏問安否且曰已改除本路提點刑獄矣吏以死聞溫公甚嘆之厚賻其家後二日范伯嘉子豐蜀公之仲子也謁溫公復使人舁致以歸子豐亟還許才升堂見蜀公畢入其室即殂子豐有才力明敏過人豸從其遊甚久相知亦深太史公講太史奉諱惡天子齋戒受諌之説注謂子卯與先代忌辰之類為諱惡公曰以臣所見所謂諱惡者危亡之言不絶於耳為人臣必使危亡之言不絶於口然後君臣相與戒慎畏懼則保其社稷若夫子卯雖為桀紂亡日與先代忌辰此有司常事爾不足道也天子齋戒受諫禮云嵗終臣以為乃嵗首也書云每嵗孟春遒人以木鐸徇於路官師相規工執藝事以諫天子齋戒受之以敬也此皆先儒之所不及逺甚蘇過叔黨言其堂姊嫁蒲徹徹資政傳正之子也傳正守長安日徹之婦閉戶不治一事惟滴酥為花果等物每請客一客二十餘飣皆工巧盡力為之者只用一次復速客則更之以此諸婦日夜滴酥不輟叔黨又曰蒲公有大洗面小洗面大濯足小濯足大澡浴小澡浴蓋一日兩洗面兩濯足間日則浴焉小洗面一易湯用二人惟頮其面而已大洗面三易湯用五人肩頸及焉小濯足一易湯用二人惟踵踝而已大濯足三易湯用四人膝股及焉小澡浴則湯用三斛人用五六大澡浴則湯用五斛人用八九口脂面藥薰爐妙香次第用之人以為勞公不憚也蓋公以文章顯用為時大臣志氣磊落奉飬雅潔故也頃公有書與東坡自云晚年有所得東坡答之曰聞所得甚高固以為慰然復有二尚欲奉勸一曰儉二曰慈此言真蒲公之所當聞也太史公講月令開題凡數千言備陳厯世遵隂陽為政事之迹與魏相栁宗元之説反復甚明前世論時令者莫能過也且曰儒者多言不必從月令故時令論立説誠有以破漢儒附會災異之弊然洪範以五事應五行有休徴咎徴符契甚明後之人君不可不為鑒也太史公講月令開題曰行春令則云云者人君之政令非天之時氣也故此之時必當行其本時之令以順之若逆之則五行相克之氣隨類來應如人五臟相勝則有受克之處其不和之氣自來為病也今人見時之氣寒燠非候曰行某令行某令者非也豸在元祐三年省試䇿問有魏相時令者豸之所對大略與太史公之説同但其卒曰王者應天以實不以文故人和而天地之和應之不必法其繁文末節但時和嵗豐家給人足則便為太平之實若求夫朱草生鳳凰至等瑞皆漢代君臣不務本而區區尚有虗文也漢之好復古者無若王莽而劉歆又以儒術緣飾之奏祥瑞作頌聲者甚衆無益於治可救其亂乎詞多不能詳姑記其大槩昔既不效何必道乎王豐甫言章元弼頃娶中表陳氏甚端麗元弼貌寢陋嗜學初眉山集有雕本元弼得之夜觀忘寐陳氏有言遂求去元弼出之元弼每以此説為朋友言之且曰緣吾讀眉山集而致之也元弼越人文蒙之子少豸一嵗嘗以賢良方正科被召太史公極愛之嘗三薦於朝朝廷以太史公之薦元弼雖蔭補未登科亦除陳州州學教授元弼好謁當塗巨公嘗自咸平晨餐行七十五里入都懷刺來謁中途不遑秣馬也甚癯瘁隆冬短褐冠敝履穿併日而食陳州之行太史之賜厚矣蘇仲豫言蔣頴叔之為江淮發運也其才智有餘人莫能欺漕運絡繹蔣吳人諳知風水嘗於所居公署前立一旗曰占風旗使人日候之置籍焉令諸漕綱日程亦各記風之便逆蓋雷雨雪雹霧露等有或不均風則天下皆一每有運至取其日程厯以合之責其稽緩者綱吏畏服蔣之去占風旗廢矣國朝法綱船不許住滯一時所過稅場不得撿稅兵梢口食許於所運米中計口分升斗借之至下卸日折算逐人之俸糧除之蓋以舟不住則漕運甚速不撿則許附私商販雖無明條以許人而有意於兼容為小人之啖利有以役之也借之口糧雖明許之然漕運既速所食幾何皆立法之深意也自洛司置舟官載客貨沿路稅場既為所併而綱兵搭附遂止邇來導洛司既廢然所過稅場有隨船撿稅之滯小人無所啖利日食官米甚多於是盜糶之弊興焉既食之又盜之而轉搬納入者動經旬月不為交量往往鑿竇自沉以滅其迹有司治罪鞭配日衆大農嵗計不充雖令犯人逐月尅糧填納豈可敷足張文定為三司使日云嵗虧六萬斛今比年不啻五十餘萬斛矣而其弊乃在於綱兵也東坡為揚州嘗陳前弊於朝請罷沿路隨船撿稅江淮之弊往往除焉然五十萬之闕未能遽復數年之後可見其效淮南楚揚泗數州自刑綱吏不啻百人能救其弊此刑自省仁人之言其利溥哉蘇仲豫言頃在先帝朝葉溫叟嘗提舉陜西保甲忽有詔曰御批問所隸諸州所教保甲精粗如何粗音粗或作粗葉上劄子言臣所教保甲委是精粗奏至神宗笑之謂侍臣曰葉溫叟將謂粗字是精確也朝無咎云著作職今不修日厯甚間但改教坊判官致語口號等及小祠祭校對祝版朝無咎言頃仁宗嘉祐末英宗已判宗正時館中進所校對祝版凡九每版皆曰嗣皇帝某或曰嗣天子臣某舊例御書各貼黃云署仁宗時苑中親作一亭甚華仁宗自名之曰迎曙亭已而悟乃英宗名也改之曰迎旭亭仁宗以旭字未安又改之曰迎煦亭皆默符英皇之名神宗嫌名今上御名也天命符瑞之驗預有定哉李錞希聲言頃侍其祖茂直為江西監司日聞徐禧自御史中丞以母喪還洪府日洪有媼善以三世祿命書言人吉凶德占俾占之曰當與兵死徐氏盡皆怒之媪曰無煩怒也其書古人所記其變具存以其書示之畫一僵尸身首異處血汚狼籍而烏鳥啄之徐氏猶欲以妖言將檄有司笞之媪以衆解得免後德占敗永樂城破敵既害之蹂踐其尸正符媪説媪尚存洪人因重之又曰禧經制西事日與沈括議入居永樂括不欲入禧以不同其計自以數萬人守焉禧自守敵大縱兵圍之四面不見其際禧節制諸將不許出戰城中兵相殘殺禧命曲珍內平之守既久城中無水兵皆渴至有殺人而吮睛飲血者禧命掘井井數十尺方及泉既汲禧命以軍額髙下次第飲之衆兵怨怒凡汲一􅎆衆兵皆以衣漬而吮之衆渴不已請開城飲於濠雖死不憾城開外兵遂入而屠焉又言徐禧之妻黃魯直堂妹也故禧死魯直祭之文有文足以經邦武足以定難之句禧之沒朝廷厚其贈與至金紫光祿大夫吏部尚書諡忠愍官其子弟八人禧止有一子甚幼曰俯遂獨受其遺澤至通直郎今上即位覃恩轉奉議郎今年才十有六嵗矣近娶吕溫卿之女蓋吕吉甫與禧厚善故也每讀責吕吉甫誥至於力引狂生之謀馴至永樂之禍未嘗不泣涕也好讀兵書善學其舅魯直近有詩云平生功名心夜窗短檠燈大賞之也東坡言普安禪院初在五代時有一僧曰某者卓庵道左萟蔬丐錢以奉佛事一日於庵中晝寢夢一金色黃龍來食所萟萵苣數畦僧寤驚曰是必有異人至此已而見一偉丈夫於所夢地取萵苣食之僧視其貌神色凛然遂攝迎之延於庵中饋食甚勤復又取數鐶餞之曰富貴無相忘因以所夢告之且曰公他日得志願為老僧只於此地建一大寺幸甚偉丈夫乃藝祖也既即位求其僧尚存遂命建寺賜名曰普安都人至今稱為道者院元祐八年因送范河中過此院間言及之東坡云郭子儀鎮河中日河甚為患子儀禱河伯曰水患止當以女奉妻已而河復故道其女一日無疾而卒子儀以其骨塑之於廟至今祀之惜乎此事不見於史也國朝面賜緋即四䙆義襴衫寶瓶銀帶例服三日元祐七年春末陳祥道學士進禮圖儀注已除館閣校勘明年用為太常博士乃賜緋衣四䙆袍銀帶往謝禮部蘇尚書公為言頃石參政中立為館閣時亦賜緋仍繫銀帶石滑稽服之無怍色過司天監馬驚墜地銀帶頗傷衆吏曰何星也石曰吾不善推步但怪土犯寶瓶耳一時士人莫不以為笑也祥道聞之亦甚笑祥道許少張榜登科禮學通博一時少及仕宦二十七年而官止於宣義郎蓋初仕時父毆公人死而祥道任其罪久廢中間為太學博士亦坐纍故屯蹇至老嘗為禮圖一百五十卷儀禮説六十餘卷內相范公為進之乞送祕閣及太常寺故有是命沒齒困窮而不遇賞音也自賜緋不餘旬而卒或曰雖不土犯寶瓶臨行年也孫巨源內翰從貢父求墨而吏送逹孫莘老中丞巨源以其求而未得讓劉劉曰已嘗送君矣已而知莘老誤留也以其皆取姓孫而為館職故吏輩莫得而别焉劉曰何不取其髯而别吏曰皆鬍而莫能分也劉曰既是皆鬍何不以其身之大小為别吏曰諾於是館中以孫莘老為大鬍孫學士巨源為小鬍孫學士比年多自七寺卿除侍郎一日因景靈宫國忌行香時寺監並會於幕次外有從者坐地上各話其所事光祿宗之從者曰吾卿當作侍郎矣蓋宰相之子今一叔為少傅一叔為使相判太原只言家世必吾卿也文太僕及之從者曰吾卿職是修撰父是太師若言家世豈光祿可及乎髙太府遵惠之從者曰若言吾卿必為侍郎矣趙衛尉令鑠之從者曰吾卿則太祖皇帝之後今皇帝之近族也亮非諸卿可能及矣衆從者皆服俄有王司農孝先之從者曰吾卿曾作大理領都水出入重職多歷年嵗若除侍郎吾卿必矣衆從者皆譟之曰汝雖官髙職重宣力不少奈何親戚族人見任壯丁耆長乎王之從者不勝其怒遂毆諸卿之從者從者復衆毆擊至有流血者皆為邏卒擒捕之詣尹治焉東坡公云日者王實王寧見訪實韓持國少傅之壻也因問持國安否實寧皆曰自致政尤好歡嘗自謂人曰吾已癃老且將聲樂酒色以娛年不爾無以度日東坡曰惟其殘年正不當爾君兄弟至親且舊願為某傳一語於持國可乎實寧曰諾坡曰頃有一人未嘗參禪而雅合禪理死生之際極為了然一日置酒大會親友酒闌語衆曰老夫即今且去因攝衣正坐將奄奄焉諸子惶遽呼號曰大人今日乃與世訣乎願留一言為教老人曰本欲無言今為汝懇只且第一五更起諸子未諭曰何也老人曰惟五更可以勾當自家事日出之後欲勾當則不可矣諸子曰家中幸豐何用早起舉家諸事皆是自家事也豈有分别老人曰不然所謂自家事者是死時將得去者吾平生治生今日就化可將何者去諸子頗悟今持國果自以謂殘年請二君言與持國但言某請持國勾當自家事與其勞心聲酒不若為可以死時將去者計也坡又曰范景仁平生不好佛晚年清慎減節嗜欲一物不芥蒂於心真却是學佛作家然至死常不取佛法某謂景仁雖不學佛而逹佛理雖毁佛罵祖亦不害已東坡謂豸與李祉言曰某平生於寢寐時自得三昧吾初睡時且於牀上安四體無一不穩處有一未穩須再安排令穩既穩或有些小倦痛處略按摩訖便瞑目聽息既勻直宜用嚴整其天君四體雖復有疴癢亦不可少有蠕動務在定心勝之如此食頃則四肢百骸無不和通睡思既至雖寐不昏吾每日須於五更初起櫛髮數百頮面盡服裳衣畢須於一淨榻上再用此法假寐數刻之味其美無涯通夕之味殆非可比平明吏徒既集一呼即興冠帶上馬率以為常二君試用吾法自當識其趣無以語人知也天下之理能戒然後能慧蓋慧性圓通必從戒謹中入未有天君不嚴而能圓通覺悟者也二君試識之吕元明希哲侍講為豸言頃仁皇時太學之法寬簡國子先生必求天下賢士真可為人師表者就其中又擇其尤賢者專委掌教導規矩之事胡翼之瑗初為直講有旨專掌一學之政胡文學行義一代髙之既專學政遂推誠教育身率多士天下之士不逺萬里來就師之方是時遊太學者端為道藝稱弟子者中心悅而誠服之也胡亦甄别人物擇其過人逺甚人畏服者奬之激之以勵其志又各因其所好類聚而别居之故好尚經術者好談兵戰者好文藝者好尚節義者皆以所類羣居相與講習胡亦時召之使論其所學為定其理或自出一義使人人以對為可否之時取當時政事俾之折衷故人皆樂從而有成今朝廷舊臣往往胡之徒也太史公吕元明頃在熙寧中王荆公欲與其子雱並除崇政殿説書已有成命會吕正獻公與荆公論新法相失其事遂格後二十餘年今上之即位八年朝廷以勳臣子有學問復除前命蓋知官職命實使之雖遲遲亦必為也王公父子今已物故而元明竟居講筵雖以世德多學用亦有命也頃年客有話胡翼之為國子先生日畨禺有大商曰某氏者遣其子來就學其子儇蕩其所齎千金仍病甚瘠客於逆旅若將救死焉偶其父至京師閔而不責攜其子謁胡先生告其故曰是宜先警其心而後道之者也乃取一帙書曰汝讀是可以先知養生之術知養生然後可以進學矣其子視其書乃黃帝素問也讀未竟惴惴然懼性命之過甚悔痛自克責冀可自新胡已知其悔悟召而誨之曰知愛身則可以修身自今以始其洗心向道取古聖賢之書次第而讀之既通其義然後為文則汝可以成名聖人不貴無過而貴改過無懷昔悔第勉事業其人亦頴鋭善學學之三年登上第而歸張文潛曰先皇尚經術本欲求賢聖旨趣而一時師説競以新竒相髙妄為臆説即附意穿鑿如説詩曰溱與洧方渙渙兮士與女方秉蕳兮女曰觀乎士曰既且且往觀乎洧之外詢訏且樂惟士與女伊其相謔贈之以芍藥以謂淫佚之會芍藥善墮胎行血故為之贈然詩言士與女相謔然則士贈女乎女贈士乎借謂女贈士安用墮胎行血也此殆是以芳香為好之義何至是陋也劉貢父嘗曰贈之芍藥士女不分若夫視爾如荍貽我握椒則女贈士必矣本草云椒性溫明目暖水藏則女無用也莫不以為笑嗚呼有是種種陋説而觸類長之此為罷經義之禍其本亦以此東坡新遷東闕之第豸同李端叔秦少遊往見之東坡曰今日乃先祖太傅之忌五月十一日祖父名序甚英偉才氣過人雖不讀書而氣量甚偉頃年在鄉里郊居陸田不多惟種粟及以稻易粟大倉儲之人莫曉其故儲之纍年凡至三四千石會眉州大飢太傅公即出所儲自族人次外姻次佃戶鄉曲貧者次第以與之皆無凶嵗之患或曰公何必粟也惟粟性堅能久故可廣儲以待匱爾又繞宅皆種芋魁所收極多即及時多蓋薪芻野民乏食時即用大甑蒸之羅置門外恣人取食之賴以無飢焉祖父嗜酒甘與村父箕踞髙歌大飲時伯父登朝而外氏程舅亦登朝外祖甚富二家連姻皆以子貴封官程氏預為之謂祖父曰公何不亦預為之太傅曰兒子書云作官器用亦寄來一日方大醉中封告至并樊纓公服笏交椅水灌子衣版等物太傅時露頂戴一小冠子如指許大醉中取告箕踞讀之畢并諸物置一布囊中取告時有餘牛肉亦取置一布囊中令村童荷而歸跨驢入城城中人聞受告或就郊外觀之遇諸塗見荷擔二囊莫不大笑程老聞之面誚其太簡惟有識之士竒之眉州或有神降曰茅將軍巫覡皆狂禍福紛錯州皆畏而禱之共作大廟像宇皆雄祈驗如響太傅忽乘醉呼村僕二十許人入廟以斧钁碎其像投溪中而毁拆其廟屋竟無所靈後三年伯父初登第太傅甚喜親至劒門迎之至七家嶺忽見一廟甚大視其榜曰茅將軍太傅曰是妖神却在此為幻耶方欲率衆復毁忽一廟吏前迎拜曰君非蘇七君乎某昨夜夢神泣告曰明日蘇七君至吾甚畏之哀告蘇七君且為容恕幸存此廟俾竊食此也衆人怪之共勸焉乃捨太史公講禮王制曰礿禘蒸嘗此祭之名天地社稷五祀名山大川之在其地者因國之在其地而無主後者此祭之事犆礿祫祭之類此祭之禮然非祭之本祭之本諸侯得一國之歡心以事其先公天子得四表之歡心以事其先王者是也夫犧牲幣帛粢盛酒醴皆出於民力古者先成民而後致力於神凡以祭之本在於民而已又講王制司徒明七教以興民德曰夫以身率於上而效之曰教教之於治雖甚迂濶然古之言治者必以為先放勳曰勞之來之輔之翼之又從而振德之舜舉八元命契孔子曰道之以德齊之以禮有恥且格秦任刑罰不務德教故不旋踵而覆漢承秦弊初以法治天下惟賢臣賈誼董仲舒嘗言之文帝能聽賈誼故斷獄數百幾至刑措武帝不能聽仲舒故斷獄數萬幾至敗亡唐太宗初亦不以教化為意惟魏鄭公勸行仁義四年之間遂至大治然則為治者不可不先以教化為本也又講王制不率教移左鄉右鄉移之遂不變屏之逺方曰臣以唐虞之學不過有朴作教刑與撻以記之雖周禮至詳至悉亦無流放之刑此當是商之法湯制官刑警於有位其用法甚嚴為太學養士之禮既重則不率教之罪責之冝不可輕夫命三公九卿大夫皆入學至於王親視學皆不變彼以九年之間而不能自遷於善是惡長不悛弗順教令者也屏之逺方斯亦不足恤矣然王為之三日不舉豈其意哉成湯伊尹相與維持天下之法其嚴密如此若夫周之法則以寬仁為主雖霍叔同管蔡之惡亦降於庶人者三年而復其國非若商政之峻也商尚質周尚文商周之法皆欲人之為善而已黃任道見荆公有繆忝􅉝酉叨竊仲冬之語言同嵗也曾誠存之嘗曰近見少師韓持國云仁皇一日與宰相議政罷因賜坐從容語曰幸兹太平君臣亦宜以禮相娛樂卿等各有聲樂之奉否各言有無多寡惟宰相王文正公不邇聲色素無後房姬媵上乃曰朕賜旦細人二十卿等分為教之俟藝成皆送旦家一時君臣相悅如此旦當作曾東坡不惟文章可以蓋代而政事忠亮風節凛凛過人逺甚元祐七年上祀南郊公以兵部尚書為鹵簿使上因太廟宿齋行禮畢將至青城儀衛甚肅五使乘車至景靈宫東櫺星門外忽有赭傘覆犢車并青蓋犢車百許兩衝突而來東坡呼御營巡檢使立於車前曰西來誰何敢爾亂行曰皇后并某國太夫人國婆婆乃上之乳母國大長主也東坡曰可以狀來比至青城諭儀仗使御史中丞李端伯之純曰中丞職當肅政不可不聞李以中宫不敢言坡曰某自奏之即於青城上疏皇帝曰臣備員五使竊見二聖寅畏祇慎昭事天地敬奉宗社而內中犢車衝突鹵簿公然亂行恐纍二聖所以明祀之意謹彈劾以聞上欣然開納舊例明日法駕回中宫當迎於朱雀門下是時因疏明日中宫亦不復出東坡為禮部尚書宣仁上仙乃與禮官及太常諸官直宿禁中關決諸禮儀事至七日忽有旨下光祿供羊酒若干欲為太后太妃皇后暖孝東坡上疏以暖孝之禮出於俚俗王后之舉當化天下不敢奉詔有旨遂罷東坡帥定武諸館職餞於惠濟坡舉白浮歐陽叔弼劉伯修二校理常希古少尹曰三君但飲此酒酒釂乃言所罰三君飲竟東坡曰三君為主司而失李方叔兹可罰也三君者無以為言慙謝而已張文潛舍人在坐輒舉白浮東坡先生曰先生亦當飲此東坡曰何也文潛曰先生昔知舉而遺之與三君之罰均也舉坐大笑東坡嘗言文章之任亦在名世之士相與主盟則其道不墜方今太平之盛文士輩出要使一時之文有所宗主昔歐陽文忠常以是任付與某故不敢不勉異時文章盟主責在諸君亦如文忠之付授也門下先生蘇公子由嘗論孔子曰文武之道未墜於地在人賢者識其大者不賢者識其小者又曰女為君子儒無為小人儒又曰君子上達小人下達又曰管仲之器小哉又曰小人哉樊須也又曰硜硜然小人哉所謂小人者而非世俗所謂無禮無義不仁不智之小人也以其所知所能行皆小者近者非大者逺者禮樂射御書數凡形器度數之內其粗迹而已若夫君子聖人則所知所能行皆造道德之妙非形器度數之所能盡此其所以為大也詩有小雅大雅所言皆聖人妙道德性所以立道所以立政其變雅者不能不取之者也此皆所以為大也蓋小雅變雅所言王者政事治天下之法能與不能而已舉此求之則其類自見今詩之篇有曰大明又曰小明小宛小旻小辨之類皆因雅而言可見當時並有小大之名其不見於經者或刪定或已亡之也又論史記作商紀紀紂以西伯昌九侯鄂侯為三公九侯有好女入之紂女不喜淫紂怒殺之而醢九侯鄂侯爭之強辨之疾并脯鄂侯西伯昌聞而竊嘆崇侯虎知之以告紂紂囚西伯羑里作周紀記崇侯虎譖西伯於紂曰西伯積善纍德諸侯皆鄉之將不利於帝帝紂乃囚西伯於羑里閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因殷嬖臣費仲而獻之紂紂大説此一物足以釋西伯况其多乎乃赦西伯更賜之弓矢斧鉞使西伯專征伐曰譖西伯者崇侯虎也觀此一事書所囚之事不同然崇侯以文王歎無罪殺三公而譖之逢君之惡也忌文王修德而不勸紂之改行長君之惡也在崇侯皆為有罪矣豈太史公欲互見乎紂喜閎夭之獻釋文王之囚乃許專征代復告之曰譖之者崇侯虎也其意蓋欲文王甘心焉然文王遂伐崇以討其罪自古人君之惡無烈於紂然崇侯虎之罪竟不能逃其刑小人讒諂譖賢人君子於盛明之朝而欲逃責難矣師友談記
